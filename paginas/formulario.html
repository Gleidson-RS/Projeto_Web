<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto WEB HTML/CSS</title>
    <link rel="stylesheet" href="../css/style_formulario.css">

</head>
<body>

    <div id="links">
        <a href="../index.html">Página inicial</a> | <a href="texto.html"> Texto </a> | <a href="outros/texto_especial.html"> Texto Especial </a>| <a href="listas.html"> Listas </a> | <a href="imagens.html"> Imagens </a> | <a href="formulario.html"> Formulario </a>
    </div>

    <div id="div-form">
        <hr>
        <h3>Formulario</h3>
        <hr>


        <form name="form" id="form" method="post">
            <label for="nome">Nome</label>
            <input type="text" name="nome" id="nome" class="input-vlr01" maxlength="8" required placeholder="Informe seu Nome">


            <label for="cpf">CPF</label>
            <input type="number" name="cpf" id="cpf" class="input-vlr02" maxlength="14" required placeholder="Informe seu CPF"> 
         

            <label for="datanascimento">Data De Nascimento</label>
            <input type="date" name="datanascimento" id="datanascimento" class="input-vlr03" required>


            <label for="sexo">Sexo</label>
            <input type="radio" name="sexo" id="sexoM" class="input-op" value="" required> Masculino
            <input type="radio" name="sexo" id="sexoM" class="input-op" value="" required> Feminino
            <input type="radio" name="sexo" id="sexoM" class="input-op" value="" required> Não Declarar


            <label for="preferencias">Preferências</label>
            <br>
            <input type="checkbox" name="estudo" id="estudo" class="input-op" value="estudo"> Estudo
            <input type="checkbox" name="trabalho" id="trabalho" class="input-op" value="trabalho"> Trabalho 
            <input type="checkbox" name="viagem" id="viagem" class="input-op" value="viagem"> Viagem 
            <input type="checkbox" name="compras" id="compras" class="input-op" value="compras"> Compras 


            <label for="senha">Senha</label>
            <input type="password" name="senha" id="senha" class="input-vlr02" maxlength="6" required placeholder="Informe a Senha">
            

            <label for="estado">Estado</label>
            <select name="estado" id="estado" class="input-vlr02" required>
                <option value="Al">Alagoas</option>
                <option value="BA">Bahia</option>
                <option value="CE">Ceará</option>
                <option value="MA">Maranhão</option>
                <option value="PA   ">Paraíba</option>
                <option value="PE">Pernambuco</option>
                <option value="PI">Píaui</option>
                <option value="RN">Rio Grando Do Norte</option>
                <option value="SE">Sergipe</option>
            </select>


            <label for="comentarios">comentários</label>
            <br>
            <textarea name="comentarios" id="comentarios" placeholder="Informe seu comentário">
            </textarea>


            <button type="submit" id="btn-enviar">Enviar</button>
            <button type="reset" id="btn-limpar">Limpar</button>
            <button type="btn">Botão</button>


        </form>

    </div>
    
</body>
</html>
